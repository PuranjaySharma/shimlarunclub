<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shimla Run Club</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      color: white;
      background-image:
        linear-gradient(rgba(0, 0, 0, 0.35), rgba(0, 0, 0, 0.35)),
        url("images/run-bg.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .top {
      padding: 40px 20px 20px;
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      font-weight: 500;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 1.5rem;
      font-weight: 400;
    }

    .bottom {
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 20px 20px 40px;
    }

    .iframe-wrapper {
      width: 100%;
      max-width: 600px;
    }

    .iframe-wrapper iframe {
      width: 100%;
      height: 450px;
      border: 1px solid #bfcbda88;
      border-radius: 4px;
      display: block;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
      }

      h2 {
        font-size: 1.1rem;
      }

      .top {
        padding: 30px 16px 16px;
      }

      .bottom {
        padding: 16px 16px 24px;
      }

      .iframe-wrapper iframe {
        height: 420px;
      }
    }
  </style>
</head>
<body>

  <div class="top">
    <h1>SHIMLA RUN CLUB</h1>
    <h2>UPCOMING RUN — MARCH 22</h2>
  </div>

  <div class="bottom">
    <div class="iframe-wrapper">
      <iframe
        src="https://luma.com/embed/event/evt-ZyAtQJ8u0FgNiz9/simple"
        width="600"
        height="450"
        frameborder="0"
        style="border: 1px solid #bfcbda88; border-radius: 4px;"
        allow="fullscreen; payment"
        aria-hidden="false"
        tabindex="0"
      ></iframe>
    </div>
  </div>

</body>
</html>
