<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shimla Run Club</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Helvetica Neue', Helvetica, Arial, sans-serif;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  color:white;
  background-image: linear-gradient(
    rgba(0,0,0,0.35),
    rgba(0,0,0,0.35)
  ),
  url("images/run-bg.jpg");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
}

.top{
  padding:40px 20px;
  text-align:center;
}

h1{
  font-size:3rem;
  font-weight:500;
  margin-bottom:10px;
}

h2{
  font-size:1.5rem;
  font-weight:400;
}

/* bottom section */
.bottom{
  padding:40px;
  display:flex;
  justify-content:center;
}

/* button group */
.button-group{
  display:flex;
  flex-direction:column;
  gap:16px;
  align-items:center;
}

/* PREMIUM BUTTON */
.luma-checkout--button{
  display:inline-block;
  background-color:#000;
  color:#fff;
  padding:14px 36px;
  font-size:0.85rem;
  letter-spacing:2px;
  text-transform:uppercase;
  text-decoration:none;
  border-radius:2px;
  transition:all 0.25s ease;
  min-width:280px;
  text-align:center;
}

/* hover */
.luma-checkout--button:hover{
  background-color:#111;
  transform:translateY(-2px);
}

/* highlight Sunday button */
.button-group a:last-child{
  transform:scale(1.05);
}

/* mobile */
@media (max-width:600px){
  h1{
    font-size:2rem;
  }

  h2{
    font-size:1.2rem;
  }

  .luma-checkout--button{
    padding:12px 28px;
    font-size:0.8rem;
    min-width:220px;
  }
}
</style>
</head>

<body>

<div class="top">
  <h1>SHIMLA RUN CLUB</h1>
  <h2>UPCOMING RUNS</h2>
</div>

<div class="bottom">
  <div class="button-group">


<a
  href="https://luma.com/event/evt-JtzqwSB9ves5z5U"
  class="luma-checkout--button"
  data-luma-action="checkout"
  data-luma-event-id="evt-JtzqwSB9ves5z5U"
>
  SUNDAY | April 26
</a>

<script id="luma-checkout" src="https://embed.lu.ma/checkout-button.js"></script>
</body>
</html>
