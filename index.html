<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shimla Run Club</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background-color: #ffffff;
      color: #000000;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 3rem;
      font-weight: 500;
      margin-bottom: 2rem;
    }

    h2 {
      font-size: 1.5rem;
      font-weight: 400;
      margin-bottom: 2rem;
      letter-spacing: 1px;
    }

    .register-container {
      margin-top: 10px;
    }

    .luma-checkout--button {
      font-size: 1.2rem;
      text-decoration: underline;
      color: #1a73e8;
      cursor: pointer;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
      }

      h2 {
        font-size: 1.2rem;
      }
    }
  </style>

</head>

<body>

  <h1>SHIMLA RUN CLUB</h1>
  <h2>UPCOMING RUN – MARCH 15</h2>

  <div class="register-container">

    <a
      href="https://luma.com/event/evt-wbo3apKClWbpDIk"
      class="luma-checkout--button"
      data-luma-action="checkout"
      data-luma-event-id="evt-wbo3apKClWbpDIk"
    >
      Register for Sunday Run
    </a>

  </div>

  <script id="luma-checkout" src="https://embed.lu.ma/checkout-button.js"></script>

</body>
</html>
