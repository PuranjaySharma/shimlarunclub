<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shimla Run Club</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Helvetica Neue', Helvetica, Arial, sans-serif;
height:100vh;
display:flex;
flex-direction:column;
justify-content:space-between;
color:white;

/* background image */
background-image: linear-gradient(
rgba(0,0,0,0.35),
rgba(0,0,0,0.35)
),
url("images/run-bg.jpg");

background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

/* top section */

.top{
padding:40px 20px;
text-align:center;
}

h1{
font-size:3rem;
font-weight:500;
margin-bottom:10px;
}

h2{
font-size:1.5rem;
font-weight:400;
}

/* bottom button */

.bottom{
padding:40px;
text-align:center;
}

.luma-checkout--button{
font-size:1.3rem;
color:#4da3ff;
text-decoration:underline;
cursor:pointer;
}

/* mobile */

@media (max-width:600px){

h1{
font-size:2rem;
}

h2{
font-size:1.2rem;
}

}

</style>
</head>

<body>

<div class="top">
<h1>SHIMLA RUN CLUB</h1>
<h2>UPCOMING RUN — MARCH 15</h2>
</div>

<div class="bottom">

<a
href="https://luma.com/event/evt-wbo3apKClWbpDIk"
class="luma-checkout--button"
data-luma-action="checkout"
data-luma-event-id="evt-wbo3apKClWbpDIk">
Register for Event
</a>

</div>

<script id="luma-checkout" src="https://embed.lu.ma/checkout-button.js"></script>

</body>
</html>
